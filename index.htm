<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", sans-serif;
        }
        body {
            background: #f6f6f6;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .input-box {
            background: #fff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        textarea {
            width: 100%;
            height: 100px;
            border: none;
            outline: none;
            font-size: 14px;
            line-height: 1.7;
            color: #444;
            resize: none;
        }
        .btn-add {
            background: #f27a99;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            margin-top: 10px;
            cursor: pointer;
        }
        .text-card {
            background: #fff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .card-user {
            font-size: 15px;
            color: #222;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .card-content {
            font-size: 14px;
            color: #444;
            line-height: 1.8;
            white-space: pre-line;
        }
        .card-time {
            font-size: 12px;
            color: #999;
            margin-top: 16px;
        }
        .tip {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-box">
            <textarea id="inputText" placeholder="输入文字，提交自动同步GitHub永久保存"></textarea>
            <button class="btn-add" onclick="saveToGithub()">提交并云端保存</button>
            <div class="tip">✅ 数据存GitHub仓库，全局永久生效</div>
        </div>

        <div id="textList"></div>
    </div>

    <script>
        // ========== 【需要你改成自己的信息】 ==========
        const CONFIG = {
            owner: "你的GitHub用户名",
            repo: "你的仓库名",
            filePath: "data.json",
            token: "你的GitHub个人令牌"
        };
        // ============================================

        // 初始化加载云端文字
        window.onload = fetchData;

        // 读取GitHub仓库的data.json
        async function fetchData() {
            const res = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/${CONFIG.filePath}`);
            const list = await res.json();
            renderCard(list);
        }

        // 渲染卡片 爬虫友好结构
        function renderCard(list) {
            const wrap = document.getElementById("textList");
            wrap.innerHTML = "";
            list.forEach(item => {
                const div = document.createElement("div");
                div.className = "text-card";
                div.innerHTML = `
                    <div class="card-user">note_user</div>
                    <div class="card-content">${item.content}</div>
                    <div class="card-time">${item.time}</div>
                `;
                wrap.appendChild(div);
            });
        }

        // 新增文字 提交到GitHub
        async function saveToGithub() {
            const content = document.getElementById("inputText").value.trim();
            if(!content) return alert("请输入内容");

            // 1.获取原有数据
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.filePath}`);
            const file = await res.json();
            const oldData = JSON.parse(atob(file.content));

            // 2.拼接新内容
            oldData.unshift({
                content: content,
                time: new Date().toLocaleString()
            });

            // 3.更新写入GitHub文件
            await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.filePath}`,{
                method:"PUT",
                headers:{
                    "Authorization": `token ${CONFIG.token}`,
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    message:"新增文字内容",
                    content: btoa(JSON.stringify(oldData,null,2)),
                    sha: file.sha
                })
            });

            alert("保存成功！已同步云端");
            document.getElementById("inputText").value = "";
            fetchData();
        }
    </script>
</body>
</html>
